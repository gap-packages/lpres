downloads:
    - name: .tar.gz
      url: https://github.com/gap-packages/lpres/releases/download/v1.1.2/lpres-1.1.2.tar.gz

abstract: |
    The LPRES Package defines new GAP objects to work with L-presented groups, namely groups given by a finite generating set and a possibly-infinite set of relations given as iterates of finitely many seed relations by a finite set of endomorphisms. The package implements nilpotent quotient, Todd-Coxeter and Reidemeister-Schreier algorithms for L-presented groups.

status: accepted
doc-html: doc/chap0_mj.html
doc-pdf: doc/manual.pdf
keywords: |
    nilpotent quotient algorithm, nilpotent presentations, finitely generated groups, Grigorchuk group, Gupta-Sidki group, L-presented groups, finite index subgroup of L-presented groups, coset enumeration, recursively presented groups, infinite presentations, commutators, lower central series, Free Engel groups, Free Burnside groups, computational, parallel computing.
